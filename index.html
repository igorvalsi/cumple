<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mis 18 Años</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>



<div class="overlay"></div>

<div class="particles"></div>

<div class="container">

    <div class="card">

        <span class="badge">
            ✨ Estás Invitado ✨
        </span>

        <h1>
            Mis <span>18</span> Años
        </h1>

        <p class="texto">

            Me haría muy feliz que compartieras conmigo este momento tan especial.

        </p>

        <div class="datos">

            <div class="dato">

                <i class="fa-solid fa-calendar-days"></i>

                <div>

                    <h3>Fecha</h3>

                    <p>27 de Julio de 2026</p>

                </div>

            </div>

            <div class="dato">

                <i class="fa-solid fa-clock"></i>

                <div>

                    <h3>Hora</h3>

                    <p>20:30 hs</p>

                </div>

            </div>

            <div class="dato">

                <i class="fa-solid fa-location-dot"></i>

                <div>

                    <h3>Lugar</h3>

                    <p>Ituzaingó 986</p>

                </div>

            </div>

            <div class="dato">

                <i class="fa-solid fa-utensils"></i>

                <div>

                    <h3>Importante</h3>

                    <p>Llevar menaje</p>

                </div>

            </div>

        </div>
<h2 class="contador-titulo">
⏳ Falta para comenzar la celebración
</h2>
        <div class="contador">

            <div class="tiempo">

                <span id="dias">00</span>

                <small>Días</small>

            </div>

            <div class="tiempo">

                <span id="horas">00</span>

                <small>Horas</small>

            </div>

            <div class="tiempo">

                <span id="minutos">00</span>

                <small>Minutos</small>

            </div>

            <div class="tiempo">

                <span id="segundos">00</span>

                <small>Segundos</small>

            </div>

        </div>

        <hr>

        <h2>Confirmar asistencia</h2>

       <form id="formulario">

    <input
    type="text"
    id="nombre"
    name="nombre"
    placeholder="Nombre completo"
    required>

    <input
    type="tel"
    id="telefono"
    name="telefono"
    placeholder="Número de celular">

    <select 
    id="asistencia"
    name="asistencia"
    required>

        <option value="">
            ¿Asistirás?
        </option>

        <option value="Sí">
            ✅ Sí asistiré
        </option>

        <option value="No">
            ❌ No podré asistir
        </option>

    </select>


    <input
    type="number"
    id="personas"
    name="personas"
    value="1"
    min="1">


    <textarea
    id="mensaje"
    name="mensaje"
    placeholder="Mensaje (opcional)"
    rows="4"></textarea>


    <button type="submit" class="confirmar">

        <i class="fa-solid fa-heart"></i>

        Confirmar asistencia

    </button>

</form>
        <div id="respuesta"></div>

        <div class="botones">

            <a href="https://maps.google.com/?q=Ituzaingo+986"
            target="_blank">

                <button
                type="button"
                class="maps">

                    <i class="fa-solid fa-map-location-dot"></i>

                    Ver ubicación

                </button>

            </a>

            <a href="https://wa.me/59899604547"
            target="_blank">

                <button
                type="button"
                class="whatsapp">

                    <i class="fa-brands fa-whatsapp"></i>

                    WhatsApp

                </button>

            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</body>

</html>
